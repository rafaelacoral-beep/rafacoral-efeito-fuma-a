<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeito Smoky</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Fundo preto */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        ul {
            margin: 0;
            padding: 0;
            display: flex;
        }

        ul li {
            list-style: none;
            color: #fff; /* Cor branca */
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 10px;
            transition: 2s; /* Duração do efeito */
        }

        /* O segredo do efeito acontece aqui ao passar o mouse */
        ul:hover li {
            transform: rotate(45deg) translateY(-200px);
            opacity: 0;
            filter: blur(20px);
        }

        /* Atraso (delay) para cada letra sumir uma por uma */
        ul li:nth-child(1) { transition-delay: 0s; }
        ul li:nth-child(2) { transition-delay: 0.1s; }
        ul li:nth-child(3) { transition-delay: 0.2s; }
        ul li:nth-child(4) { transition-delay: 0.3s; }
        ul li:nth-child(5) { transition-delay: 0.4s; }
    </style>
</head>
<body>

    <ul>
        <li>s</li>
        <li>m</li>
        <li>o</li>
        <li>k</li>
        <li>y</li>
    </ul>

</body>
</html>
